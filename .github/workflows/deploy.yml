name: 🚀 Deploy to Octenium (SSH/rsync)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: 📦 Upload via SSH
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔑 Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p 5804 162.19.98.77 >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: 🚀 Deploy via rsync
        run: |
          rsync -avz --delete \
            --exclude='.git*' \
            --exclude='.DS_Store' \
            --exclude='node_modules/' \
            -e "ssh -p 5804 -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
            ./public_html/ \
            gaeehnc@162.19.98.77:/home/gaeehnc/public_html/
