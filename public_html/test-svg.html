<!DOCTYPE html>
<html>
<body style="background: #111;">
  <div style="position: absolute; top: 200px; left: 200px;">
    <!-- Flashlight wrapper -->
    <div style="position: relative;">
      
      <!-- Beam (pointing top-left) -->
      <div style="
        position: absolute;
        width: 250px;
        height: 250px;
        background: radial-gradient(circle at bottom right, rgba(255,255,255,0.4) 0%, transparent 70%);
        clip-path: polygon(100% 100%, 0 20%, 0 0, 20% 0);
        bottom: 0px;
        right: 0px;
        transform-origin: bottom right;
        pointer-events: none;
      "></div>

      <!-- Flashlight Body (pointing top-left) -->
      <svg width="40" height="40" viewBox="0 0 40 40" style="position: absolute; top: 0; left: 0; pointer-events: none;">
        <g transform="rotate(-45 20 20)">
          <!-- We want it to point left, then rotate -->
          <path d="M10 15 L35 15 L35 25 L10 25 Z" fill="#fff"/>
          <path d="M10 12 L0 10 L0 30 L10 28 Z" fill="#fff"/>
        </g>
      </svg>
      
    </div>
  </div>
</body>
</html>
